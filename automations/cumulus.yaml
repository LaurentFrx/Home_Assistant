      entity_id: input_boolean.cumulus_verrou_jour
  - service: logbook.log
    data:
      name: Cumulus Verrou Désactivé (Météo)
      message: '



        Verrou désactivé à 23h00 : météo défavorable demain.



        Chauffe HC préventive autorisée.



        Prévision demain : {{ states(''sensor.solcast_pv_forecast_previsions_pour_demain'')
        }} kWh



        '
- id: cumulus_reset_daily_et_override
  alias: Cumulus — Reset quotidien & Override
  mode: single
  trigger:
  - id: daily_reset
    platform: time
    at: 08:10:00
  - id: override_on
    platform: state
    entity_id: input_boolean.cumulus_override
    to: 'on'
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: override_on
      sequence:
      - variables:
          sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
      - condition: state
        entity_id: input_boolean.cumulus_override
        state: 'on'
      - condition: state
        entity_id: input_boolean.cumulus_interdit_depart
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_mode_vacances
        state: 'off'
      - condition: template
        value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
          and is_state(sw_id,''off'') }}'
      - service: switch.turn_on
        target:
          entity_id: '{{ sw_id }}'
    - conditions:
      - condition: trigger
        id: daily_reset
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.cumulus_temp_atteinte_aujourdhui
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.cumulus_verrou_jour
- id: cumulus_reset_locks_debut_fenetre_pv
  alias: Cumulus — Reset locks au début fenêtre PV
  description: Reset verrous à 10:20 pour permettre chauffe PV après HC nocturne
  mode: single
  trigger:
  - platform: template
    value_template: >
      {{ now().strftime('%H:%M') == states('input_datetime.cumulus_plage_pv_debut')[0:5] }}
  condition:
  - condition: state
    entity_id: input_boolean.cumulus_verrou_jour
    state: 'on'
  - condition: state
    entity_id: input_boolean.cumulus_temp_atteinte_aujourdhui
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id:
        - input_boolean.cumulus_verrou_jour
        - input_boolean.cumulus_temp_atteinte_aujourdhui
  - service: logbook.log
    data:
      name: Cumulus Reset Fenêtre PV
      message: "Verrous réinitialisés au début de la fenêtre PV ({{ now().strftime('%H:%M') }}). Permet nouvelle évaluation avec soleil disponible."
- id: cumulus_override_desactive_verrou
  alias: Cumulus — Override désactive verrou
  description: Permet commande manuelle même si verrou actif
  mode: single
  trigger:
  - platform: state
    entity_id: input_boolean.cumulus_override
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.cumulus_verrou_jour
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.cumulus_verrou_jour
  - service: persistent_notification.create
    data:
      title: Cumulus - Forçage Manuel Activé
      message: '





        Verrou jour désactivé automatiquement.





        Vous pouvez commander le cumulus manuellement.



        '
      notification_id: cumulus_override_actif
  - service: logbook.log
    data:
      name: Cumulus Override
      message: Verrou désactivé par forçage manuel
      entity_id: input_boolean.cumulus_override
- id: cumulus_alerte_besoin_urgent
  alias: Cumulus — Alerte besoin urgent
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_besoin_chauffe_urgente
    to: 'on'
    for:
      hours: 1
  condition:
  - condition: state
    entity_id: input_boolean.cumulus_mode_vacances
    state: 'off'
  action:
  - variables:
      derniere_chauffe: "\n\n{% set ts = state_attr('input_datetime.cumulus_derniere_chauffe_complete',\
        \ 'timestamp') %}\n\n\n{% if ts is not none and ts > 0 %}\n\n\n  {{ ts | timestamp_custom('%d/%m\
        \ %H:%M') }}\n\n\n{% else %}\n\n\n  Jamais\n\n\n\n{% endif %}"
  - service: persistent_notification.create
    data:
      title: Cumulus - Chauffe Urgente
      message: '





        Délai max {{ states(''input_number.cumulus_espacement_max_h'') }}h dépassé.





        Dernière chauffe : {{ derniere_chauffe }}





        Température : {{ states(''sensor.cumulus_temperature_physique_c'') }}°C



        '
      notification_id: cumulus_alerte_urgent
  description: 'Notification proactive quand eau chaude insuffisante. Permet intervention
    avant rupture service. Valeur: Évite inconfort (douche froide) + alerte anticipée.
    KPI: Délai moyen alerte avant T°min critique.'
- id: cumulus_log_refus_demarrage
  alias: Cumulus — Log refus démarrage
  description: Notifie quand PV suffisant mais cumulus ne démarre pas
  mode: single
  trigger:
  - platform: template
    value_template: "\n\n{{ states('sensor.cumulus_puissance_disponible_w')|float(0)\n\
      \n\n   > states('sensor.cumulus_seuil_pv_dynamique_w')|float(9999)\n }}"
    for:
      seconds: 60
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    state: 'off'
  - condition: state
    entity_id: binary_sensor.cumulus_fenetre_pv
    state: 'on'
  action:
  - variables:
      raisons_blocage: "\n\n{% set raisons = [] %}\n\n{% if is_state('input_boolean.cumulus_interdit_depart',\
        \ 'on') %}\n\n\n\n  {% set raisons = raisons + ['Mode INTERDIT'] %}\n\n\n\
        {% endif %}\n\n{% if is_state('input_boolean.cumulus_mode_vacances',\n 'on')\
        \ %}\n\n\n  {% set raisons = raisons + ['Mode VACANCES'] %}\n\n\n{% endif\
        \ %}\n\n{% if is_state('input_boolean.cumulus_verrou_jour',\n 'on') %}\n\n\
        \n  {% set raisons = raisons + ['Verrou jour'] %}\n\n\n{% endif %}\n\n{% if\
        \ is_state('binary_sensor.cumulus_lave_linge_actif',\n 'on') %}\n\n\n  {%\
        \ set raisons = raisons + ['Lave-linge actif'] %}\n\n\n{% endif %}\n\n{% if\
        \ is_state('binary_sensor.cumulus_lave_vaisselle_actif',\n 'on') %}\n\n\n\
        \  {% set raisons = raisons + ['Lave-vaisselle actif'] %}\n\n\n{% endif %}\n\
        \n{% if is_state('binary_sensor.cumulus_appareil_prioritaire_actif',\n 'on')\
        \ %}\n\n\n  {% set raisons = raisons + ['Appareil prioritaire actif'] %}\n\
        \n\n{% endif %}\n\n{% set soc = states('sensor.cumulus_soc_solarbank_pct')\n\
        \ | float(0) %}\n\n{% if soc < 10 %}\n\n\n  {% set raisons = raisons + ['SOC\
        \ trop bas (' ~ soc ~ '%)'] %}\n\n\n{%\n endif %}\n\n{% if is_state('timer.cumulus_deadband_ui',\
        \ 'active') %}\n\n\n  {% set raisons = raisons + ['Deadband\n actif'] %}\n\
        \n\n{% endif %}\n\n{% if not is_state('binary_sensor.cumulus_soleil_suffisant',\
        \ 'on') %}\n\n\n  {% set\n raisons = raisons + ['APS < 100W (pas assez de\
        \ soleil)'] %}\n\n\n{% endif %}\n\n{{ raisons | join(', ') if raisons\n |\
        \ length > 0 else 'Raison inconnue' }}"
  - service: persistent_notification.create
    data:
      title: Cumulus - Refus Démarrage
      message: '





        Puissance disponible ({{ states(''sensor.cumulus_puissance_disponible_w'')
        }}W) > seuil ({{ states(''sensor.cumulus_seuil_pv_dynamique_w'')

        }}W)





        mais cumulus ne démarre pas.











        Blocage : {{ raisons_blocage }}



        '
      notification_id: cumulus_refus_demarrage
  - service: logbook.log
    data:
      message: 'Cumulus refus démarrage : {{ raisons_blocage }}'
      name: Cumulus
- id: cumulus_detection_anomalie_coherence
  alias: Cumulus — Anomalie cohérence (CORRIGÉ)
  description: Alerte uniquement si vraie anomalie (pas fin chauffe normale)
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    to: 'off'
    for:
      minutes: 2
  condition:
  - condition: template
    value_template: >
      {{ is_state(states('input_text.cumulus_entity_contacteur'), 'on') }}
  - condition: state
    entity_id: input_boolean.cumulus_verrou_jour
    state: 'off'
  - condition: template
    value_template: >
      {% set debut_chauffe = states('input_datetime.cumulus_debut_chauffe_actuelle') | as_datetime %}
      {% if debut_chauffe is not none %}
        {% set duree_min = (now() - debut_chauffe).total_seconds() / 60 %}
        {{ duree_min < 20 }}
      {% else %}
        false
      {% endif %}
  action:
  - service: persistent_notification.create
    data:
      title: "⚠️ Cumulus - Chauffe anormalement courte"
      message: >
        {% set debut_chauffe = states('input_datetime.cumulus_debut_chauffe_actuelle') | as_datetime %}
        {% if debut_chauffe is not none %}
          {% set duree_min = ((now() - debut_chauffe).total_seconds() / 60) | int %}
        {% else %}
          {% set duree_min = 0 %}
        {% endif %}

        **Chauffe arrêtée après seulement {{ duree_min }} minutes**

        **Situation :**

        • Contacteur : {{ states(states('input_text.cumulus_entity_contacteur')) }}

        • Consommation : {{ states('sensor.cumulus_consommation_reelle_w') | float(0) | round(0) }}W

        **Causes possibles :**

        1. Cumulus déjà chaud (peu de besoin)

        2. Arrêt automatique (SOC/import/appareil)

        3. Problème technique rare

        👉 Consultez l'historique des chauffes pour diagnostic.
      notification_id: cumulus_anomalie
  - service: logbook.log
    data:
      name: ⚠️ Cumulus Anomalie
      message: >
        {% set debut_chauffe = states('input_datetime.cumulus_debut_chauffe_actuelle') | as_datetime %}
        {% if debut_chauffe is not none %}
          {% set duree_min = ((now() - debut_chauffe).total_seconds() / 60) | int %}
        {% else %}
          {% set duree_min = 0 %}
        {% endif %}
        Chauffe anormalement courte : {{ duree_min }} min. Verrou jour OFF donc température non atteinte.
      entity_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
- id: cumulus_alerte_entite_unavailable_chauffe
  alias: Cumulus — Alerte entité unavailable pendant chauffe
  description: Notifie si une entité critique devient unavailable pendant une chauffe
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_entites_ok
    to: 'off'
    for:
      seconds: 10
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    state: 'on'
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
      entites_details: '{{ state_attr(''binary_sensor.cumulus_entites_ok'', ''entites_critiques_valides'')
        }}'
  - service: persistent_notification.create
    data:
      title: ⚠️ Cumulus - Entité Unavailable Pendant Chauffe
      message: '





        Une ou plusieurs entités critiques sont devenues unavailable pendant la chauffe
        !











        État des entités :





        {{ entites_details }}











        La chauffe continue mais la fiabilité des mesures est compromise.





        Vérifiez la connectivité de vos capteurs.



        '
      notification_id: cumulus_entite_unavailable
  - service: logbook.log
    data:
      name: ⚠️ Cumulus Entité Unavailable
      message: '





        Entité(s) unavailable pendant chauffe active.





        Détails: {{ entites_details }}



        '
      entity_id: '{{ sw_id }}'
- id: cumulus_enregistrement_debut_chauffe
  alias: Cumulus — Enregistrement début chauffe
  description: Enregistre l'heure de début de chauffe pour suivi temps réel
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    to: 'on'
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.cumulus_debut_chauffe_actuelle
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  - service: logbook.log
    data:
      name: Cumulus Début Chauffe
      message: Début de chauffe enregistré à {{ now().strftime('%H:%M:%S') }}
      entity_id: binary_sensor.cumulus_chauffe_reelle
- id: cumulus_desactivation_hc_exceptionnelle
  alias: Cumulus — Désactivation auto HC exceptionnelle
  description: Désactive automatiquement le mode HC exceptionnel après chauffe ou
    au reset matinal
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    from: 'on'
    to: 'off'
    for:
      seconds: 60
  - platform: time
    at: 08:10:00
  condition:
  - condition: state
    entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
  - service: logbook.log
    data:
      name: Cumulus HC Exceptionnelle
      message: 'Mode HC exceptionnel désactivé automatiquement. Trigger: {{ trigger.platform
        }}'
- id: cumulus_alerte_sante_systeme_degradee
  alias: Cumulus — Alerte santé système dégradée
  description: Notifie si score santé système < 70%
  mode: single
  trigger:
  - platform: numeric_state
    entity_id: sensor.cumulus_sante_systeme
    below: 70
    for:
      minutes: 5
  action:
  - variables:
      score: '{{ states(''sensor.cumulus_sante_systeme'') | float(0) }}'
      niveau: '{{ state_attr(''sensor.cumulus_sante_systeme'', ''niveau_sante'') }}'
      eval_entites: '{{ state_attr(''sensor.cumulus_sante_systeme'', ''evaluation_entites'')
        }}'
      eval_coherence: '{{ state_attr(''sensor.cumulus_sante_systeme'', ''evaluation_coherence'')
        }}'
      eval_espacement: '{{ state_attr(''sensor.cumulus_sante_systeme'', ''evaluation_espacement'')
        }}'
      eval_fonctionnel: '{{ state_attr(''sensor.cumulus_sante_systeme'', ''evaluation_fonctionnel'')
        }}'
  - service: persistent_notification.create
    data:
      title: ⚠️ Cumulus - Santé Système Dégradée
      message: '





        Le score de santé du système est dégradé : {{ score | round(0) }}% ({{ niveau
        }})











        Évaluations détaillées :











        📡 Entités :





        {{ eval_entites }}











        🔍 Cohérence mesures :





        {{ eval_coherence }}











        ⏱️ Espacement chauffes :





        {{ eval_espacement }}











        ⚙️ État fonctionnel :





        {{ eval_fonctionnel }}











        Action recommandée : Vérifier la configuration et l''état des capteurs.



        '
      notification_id: cumulus_sante_degradee
  - service: logbook.log
    data:
      name: ⚠️ Cumulus Santé Dégradée
      message: '





        Score santé {{ score | round(0) }}% < 70% ({{ niveau }}).





        Entités: {{ eval_entites }}, Cohérence: {{ eval_coherence }}



        '
      entity_id: sensor.cumulus_sante_systeme
- id: cumulus_alerte_maintenance
  alias: Cumulus — Alerte maintenance préventive
  description: Alerte si comportement inhabituel répété
  mode: single
  trigger:
  - platform: numeric_state
    entity_id: sensor.cumulus_sante_systeme
    below: 70
    for:
      hours: 1
  action:
  - service: persistent_notification.create
    data:
      title: "🔧 Cumulus - Maintenance recommandée"
      message: >
        {% set sante = states('sensor.cumulus_sante_systeme') | int(0) %}
        {% set eval_entites = state_attr('sensor.cumulus_sante_systeme', 'evaluation_entites') %}
        {% set eval_coherence = state_attr('sensor.cumulus_sante_systeme', 'evaluation_coherence') %}
        {% set eval_espacement = state_attr('sensor.cumulus_sante_systeme', 'evaluation_espacement') %}

        **Score santé système : {{ sante }}%**

        Le système fonctionne mais présente des anomalies récurrentes.

        **Vérifications recommandées :**

        {% if 'KO' in eval_entites %}
        • Vérifier capteurs unavailable
        {% endif %}
        {% if 'KO' in eval_coherence %}
        • Vérifier cohérence mesures import/PV
        {% endif %}
        {% if 'Urgent' in eval_espacement %}
        • Besoin urgent actif - Vérifier pourquoi
        {% endif %}

        👉 Consultez le Guide Dépannage
      notification_id: cumulus_maintenance
  - service: logbook.log
    data:
      name: 🔧 Cumulus Maintenance
      message: >
        Alerte maintenance préventive - Score santé {{ states('sensor.cumulus_sante_systeme') }}% < 70%
      entity_id: sensor.cumulus_sante_systeme
