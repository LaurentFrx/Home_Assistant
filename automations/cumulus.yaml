- id: cumulus_on_pv_automatique
  alias: Cumulus — ON PV automatique
  description: Démarre si APS > 100W ET puissance totale > seuil dynamique ET aucun
    appareil actif
  mode: single
  trigger:
  - platform: template
    value_template: '





      {% set aps = states(''sensor.cumulus_production_aps_w'') | float(0) %}





      {% set seuil = states(''input_number.cumulus_seuil_pv_statique_w'') | float(100)
      %}





      {{ aps >= seuil }}'
    for:
      seconds: '{{ states(''input_number.cumulus_on_delay_s'')|int(10) }}'
  condition:
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.cumulus_override
      state: 'on'
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.cumulus_entites_ok
        state: 'on'
      - condition: state
        entity_id: binary_sensor.cumulus_fenetre_pv
        state: 'on'
      - condition: state
        entity_id: input_boolean.cumulus_interdit_depart
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_mode_vacances
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_verrou_jour
        state: 'off'
      - condition: state
        entity_id: binary_sensor.cumulus_lave_linge_actif
        state: 'off'
      - condition: state
        entity_id: binary_sensor.cumulus_lave_vaisselle_actif
        state: 'off'
      - condition: state
        entity_id: binary_sensor.cumulus_appareil_prioritaire_actif
        state: 'off'
      - condition: state
        entity_id: timer.cumulus_deadband_ui
        state: idle
      - condition: template
        value_template: "\n\n{{ states('sensor.cumulus_soc_solarbank_pct')|float(0)\n\
          \n\n   >= states('input_number.cumulus_soc_min_pct')|float(10)\n }}"
      - condition: template
        value_template: "\n\n{{ states('sensor.cumulus_puissance_disponible_w')|float(0)\n\
          \n\n   > states('sensor.cumulus_seuil_pv_dynamique_w')|float(9999)\n }}"
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
  - condition: template
    value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
      and is_state(sw_id, ''off'') }}'
  - service: switch.turn_on
    target:
      entity_id: '{{ sw_id }}'
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.cumulus_debut_chauffe_actuelle
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  - service: input_text.set_value
    target:
      entity_id: input_text.cumulus_raison_deadband
    data:
      value: Démarrage PV (anti-flapping)
  - service: timer.start
    target:
      entity_id: timer.cumulus_deadband_ui
    data:
      duration: 00:{{ states('input_number.cumulus_deadband_min') | int(5) }}:00
  - service: logbook.log
    data:
      name: Cumulus Démarrage PV
      message: '





        Démarrage PV. Disponible={{ states(''sensor.cumulus_puissance_disponible_w'')
        }}W





        (SB: {{ states(''input_number.cumulus_solarbank_max_w'') }}W + APS: {{ states(''sensor.cumulus_production_aps_w'')

        }}W),





        Seuil={{ states(''sensor.cumulus_seuil_pv_dynamique_w'') }}W,





        SOC={{ states(''sensor.cumulus_soc_solarbank_pct'') }}%



        '
      entity_id: '{{ sw_id }}'
- id: cumulus_limiteur_import
  alias: Cumulus — Limiteur d'import
  description: Arrêt si import réseau > seuil pendant > 4s
  mode: restart
  trigger:
  - platform: template
    value_template: "\n{% if states('sensor.cumulus_import_reseau_w') not in ['unavailable',\
      \ 'unknown'] and states('sensor.cumulus_seuil_import_limiteur_w') not in ['unavailable',\
      \ 'unknown'] %}\n{{ states('sensor.cumulus_import_reseau_w')|float(0)\n\n\n\
      \   > states('sensor.cumulus_seuil_import_limiteur_w')|float(9999)\n }}\n{%\
      \ else %}\n  false\n{% endif %}"
    for:
      seconds: 4
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    state: 'on'
  - condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.cumulus_override
      state: 'off'
    - condition: state
      entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
      state: 'off'
    - condition: state
      entity_id: binary_sensor.cumulus_en_hc
      state: 'off'
  - condition: and
    conditions:
    - condition: template
      value_template: '{{ states(''sensor.cumulus_import_reseau_w'') not in [''unavailable'',
        ''unknown''] }}'
    - condition: template
      value_template: '{{ states(''binary_sensor.cumulus_en_hc'') not in [''unavailable'',
        ''unknown''] }}'
    - condition: template
      value_template: '{{ states(''binary_sensor.cumulus_chauffe_reelle'') not in
        [''unavailable'', ''unknown''] }}'
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
  - condition: template
    value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
      and states(sw_id) == ''on'' }}'
  - service: switch.turn_off
    target:
      entity_id: '{{ sw_id }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.cumulus_raison_deadband
    data:
      value: Import réseau > {{ states('sensor.cumulus_seuil_import_limiteur_w') }}W
  - service: timer.start
    target:
      entity_id: timer.cumulus_deadband_ui
    data:
      duration: 00:{{ states('input_number.cumulus_deadband_min') | int(5) }}:00
  - service: logbook.log
    data:
      name: Cumulus Limiteur
      message: '





        Arrêt temporaire (import {{ states(''sensor.cumulus_import_reseau_w'') }}W
        > seuil).





        PAS de verrou (température non atteinte).



        '
      entity_id: '{{ sw_id }}'
- id: cumulus_fin_chauffe_universelle
  alias: Cumulus — Fin chauffe universelle (AMÉLIORÉ)
  description: Détecte fin chauffe quelle que soit l'origine (PV/HC/manuelle) avec notification intelligente
  mode: restart
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    to: 'off'
    for:
      seconds: 15
  condition:
  - condition: state
    entity_id: input_boolean.cumulus_interdit_depart
    state: 'off'
  - condition: state
    entity_id: input_boolean.cumulus_override
    state: 'off'
  - condition: template
    value_template: >
      {% if trigger.from_state is not none and trigger.from_state.state == 'on' %}
        {{ (as_timestamp(trigger.to_state.last_changed) - as_timestamp(trigger.from_state.last_changed)) >= 120 }}
      {% else %}
        false
      {% endif %}
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
      duree_chauffe_min: >
        {% if trigger.from_state is not none and trigger.from_state.state == 'on' %}
          {{ ((as_timestamp(trigger.to_state.last_changed) - as_timestamp(trigger.from_state.last_changed)) / 60) | round(0) }}
        {% else %}
          0
        {% endif %}
      switch_encore_on: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable''] and is_state(sw_id, ''on'') }}'
      conso_w: '{{ states(''sensor.cumulus_consommation_reelle_w'') | float(0) }}'
  - choose:
    - conditions:
      - '{{ switch_encore_on }}'
      - '{{ conso_w < 150 }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.cumulus_derniere_chauffe_complete
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.cumulus_temp_atteinte_aujourdhui
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.cumulus_verrou_jour
      - service: switch.turn_off
        target:
          entity_id: '{{ sw_id }}'
      - variables:
          pv_pct: '{{ state_attr(''sensor.cumulus_repartition_sources'', ''autonomie_pv_pct'') | int(0) }}'
          nouvelle_entree: '{{ now().strftime(''%d/%m %H:%M'') }} - {{ duree_chauffe_min }}min - {{ pv_pct }}% PV - Complète'
          hist_actuel: '{{ states(''input_text.cumulus_historique_chauffes'') }}'
      - service: input_text.set_value
        target:
          entity_id: input_text.cumulus_historique_chauffes
        data:
          value: >
            {% if hist_actuel in ['[]', '', 'unknown', 'unavailable'] %}
              {{ nouvelle_entree }}
            {% else %}
              {% set chauffes = hist_actuel.split('|') %}
              {% set nouvelles_chauffes = (chauffes + [nouvelle_entree])[-10:] %}
              {{ nouvelles_chauffes | join('|') }}
            {% endif %}
      - service: logbook.log
        data:
          name: Cumulus Température Max
          message: >
            Thermostat interne coupé (température max atteinte).
            Durée : {{ duree_chauffe_min }} min.
            Conso finale : {{ conso_w }}W.
            Verrou jour activé.
          entity_id: '{{ sw_id }}'
      - service: persistent_notification.create
        data:
          title: "✅ Cumulus - Chauffe terminée"
          message: >
            {% set import_w = states('sensor.cumulus_import_reseau_w') | float(0) %}
            {% set en_hc = is_state('binary_sensor.cumulus_en_hc', 'on') %}

            **Chauffe complète en {{ duree_chauffe_min }} minutes** 🎯

            • Mode : {% if import_w < 0 %}☀️ 100% solaire{% elif en_hc %}🌙 Heures creuses{% else %}⚡ Mixte solaire/réseau{% endif %}

            • Prochaine chauffe : Demain ou selon besoin

            Verrou activé - Le système gère la suite ! 😊
          notification_id: cumulus_fin_chauffe
    default:
    - variables:
        pv_pct: '{{ state_attr(''sensor.cumulus_repartition_sources'', ''autonomie_pv_pct'') | int(0) }}'
        nouvelle_entree: '{{ now().strftime(''%d/%m %H:%M'') }} - {{ duree_chauffe_min }}min - {{ pv_pct }}% PV - Interrompue'
        hist_actuel: '{{ states(''input_text.cumulus_historique_chauffes'') }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.cumulus_historique_chauffes
      data:
        value: >
          {% if hist_actuel in ['[]', '', 'unknown', 'unavailable'] %}
            {{ nouvelle_entree }}
          {% else %}
            {% set chauffes = hist_actuel.split('|') %}
            {% set nouvelles_chauffes = (chauffes + [nouvelle_entree])[-10:] %}
            {{ nouvelles_chauffes | join('|') }}
          {% endif %}
    - service: logbook.log
      data:
        name: Cumulus Fin Chauffe
        message: >
          Fin de chauffe après {{ duree_chauffe_min }} min (interruption).
          Température non atteinte, pas de verrou.
        entity_id: '{{ sw_id }}'
- id: cumulus_arret_si_appareil_demarre
  alias: Cumulus — Arrêt si appareil démarre
  description: Pause temporaire SANS verrou
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_appareil_prioritaire_actif
    to: 'on'
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    state: 'on'
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
      appareil_actif: "\n\n{% if is_state('binary_sensor.cumulus_lave_linge_actif',\
        \ 'on') %}\n\n\n  Lave-linge\n\n\n{% elif\n is_state('binary_sensor.cumulus_lave_vaisselle_actif',\
        \ 'on') %}\n\n\n  Lave-vaisselle\n\n\n{% else %}\n\n\n  Un\n appareil\n\n\n\
        {% endif %}"
  - condition: template
    value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
      and states(sw_id) == ''on'' }}'
  - service: switch.turn_off
    target:
      entity_id: '{{ sw_id }}'
  - service: timer.start
    target:
      entity_id: timer.cumulus_deadband_ui
    data:
      duration: 00:{{ states('input_number.cumulus_deadband_min') | int(5) }}:00
  - service: persistent_notification.create
    data:
      title: Cumulus - Arrêt Prioritaire
      message: '





        {{ appareil_actif }} a démarré.





        Le cumulus a été arrêté temporairement.





        Redémarrage automatique après deadband ({{ states(''input_number.cumulus_deadband_min'')
        | int(5) }} min).



        '
      notification_id: cumulus_arret_appareil
  - service: logbook.log
    data:
      name: Cumulus Arrêt Prioritaire
      message: Arrêt temporaire {{ appareil_actif }}. PAS de verrou. Deadband {{ states('input_number.cumulus_deadband_min')
        | int(5) }}min activé.
      entity_id: '{{ sw_id }}'
- id: cumulus_arret_si_conso_domestique_elevee
  alias: Cumulus — Arrêt si conso domestique élevée
  description: Pause si import > talon + marge confort avec deadband anti-flap
  mode: restart
  trigger:
  - platform: template
    value_template: '





      {% set import_w = states(''sensor.cumulus_import_reseau_w'') | float(0) %}





      {% set talon = states(''input_number.cumulus_talon_maison_w'') | float(300)
      %}





      {{ import_w > (talon + 200) }}'
    for:
      seconds: 10
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_chauffe_reelle
    state: 'on'
  - condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.cumulus_override
      state: 'off'
    - condition: state
      entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
      state: 'off'
    - condition: state
      entity_id: binary_sensor.cumulus_en_hc
      state: 'off'
  - condition: and
    conditions:
    - condition: template
      value_template: '{{ states(''sensor.cumulus_import_reseau_w'') not in [''unavailable'',
        ''unknown''] }}'
    - condition: template
      value_template: '{{ states(''binary_sensor.cumulus_en_hc'') not in [''unavailable'',
        ''unknown''] }}'
    - condition: template
      value_template: '{{ states(''binary_sensor.cumulus_chauffe_reelle'') not in
        [''unavailable'', ''unknown''] }}'
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
  - condition: template
    value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
      and states(sw_id) == ''on'' }}'
  - service: switch.turn_off
    target:
      entity_id: '{{ sw_id }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.cumulus_raison_deadband
    data:
      value: Consommation domestique élevée (Import {{ states('sensor.cumulus_import_reseau_w')
        }}W)
  - service: timer.start
    target:
      entity_id: timer.cumulus_deadband_ui
    data:
      duration: 00:{{ states('input_number.cumulus_deadband_min') | int(5) }}:00
  - service: logbook.log
    data:
      name: Cumulus Pause Conso Domestique
      message: '





        Arrêt temporaire - import {{ states(''sensor.cumulus_import_reseau_w'') }}W
        > talon+200W.





        Maison consomme plus que prévu. PAS de verrou.





        Deadband {{ states(''input_number.cumulus_deadband_min'') }}min activé.



        '
      entity_id: '{{ sw_id }}'
- id: cumulus_redemarrage_si_appareil_arrete
  alias: Cumulus — Redémarrage si appareil s'arrête
  description: Relance si température pas atteinte ET PV OK ET TOUS les appareils
    sont OFF
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_appareil_prioritaire_actif
    to: 'off'
    for:
      seconds: 60
  condition:
  - condition: state
    entity_id: binary_sensor.cumulus_lave_linge_actif
    state: 'off'
  - condition: state
    entity_id: binary_sensor.cumulus_lave_vaisselle_actif
    state: 'off'
  - condition: state
    entity_id: binary_sensor.cumulus_appareil_prioritaire_actif
    state: 'off'
  - condition: state
    entity_id: input_boolean.cumulus_temp_atteinte_aujourdhui
    state: 'off'
  - condition: state
    entity_id: input_boolean.cumulus_interdit_depart
    state: 'off'
  - condition: state
    entity_id: input_boolean.cumulus_mode_vacances
    state: 'off'
  - condition: state
    entity_id: binary_sensor.cumulus_fenetre_pv
    state: 'on'
  - condition: template
    value_template: "\n\n{{ states('sensor.cumulus_puissance_disponible_w')|float(0)\n\
      \n\n   > states('sensor.cumulus_seuil_pv_dynamique_w')|float(9999)\n }}\n"
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.cumulus_verrou_jour
  - service: logbook.log
    data:
      name: Cumulus Redémarrage
      message: '





        Tous les appareils sont arrêtés depuis 60s. Conditions réunies pour redémarrer.





        Vérification : Lave-linge=OFF, Lave-vaisselle=OFF, Composite=OFF



        '
      entity_id: input_boolean.cumulus_verrou_jour
- id: cumulus_on_debut_hc_intelligent
  alias: Cumulus — ON début HC (intelligent)
  description: Démarre en HC si besoin urgent OU météo défavorable demain OU demande
    exceptionnelle
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.cumulus_en_hc
    to: 'on'
  - platform: state
    entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
    to: 'on'
  condition:
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.cumulus_override
      state: 'on'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.cumulus_chauffe_hc_exceptionnelle
        state: 'on'
      - condition: state
        entity_id: binary_sensor.cumulus_entites_ok
        state: 'on'
      - condition: state
        entity_id: input_boolean.cumulus_interdit_depart
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_mode_vacances
        state: 'off'
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.cumulus_entites_ok
        state: 'on'
      - condition: state
        entity_id: input_boolean.cumulus_interdit_depart
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_mode_vacances
        state: 'off'
      - condition: state
        entity_id: input_boolean.cumulus_verrou_jour
        state: 'off'
      - condition: state
        entity_id: binary_sensor.cumulus_autoriser_chauffe_hc_intelligente
        state: 'on'
  action:
  - variables:
      sw_id: '{{ states(''input_text.cumulus_entity_contacteur'') }}'
  - service: logbook.log
    data:
      name: Cumulus HC Intelligent
      message: 'Démarrage HC via: {% if is_state(''input_boolean.cumulus_override'',
        ''on'') %}OVERRIDE (mode forcé){% elif is_state(''input_boolean.cumulus_chauffe_hc_exceptionnelle'',
        ''on'') %}HC EXCEPTIONNELLE (grosse conso){% else %}LOGIQUE NORMALE (besoin
        urgent OU météo défavorable){% endif %}'
  - condition: template
    value_template: '{{ sw_id != '''' and sw_id not in [''unknown'', ''unavailable'']
      and is_state(sw_id, ''off'') }}'
  - service: switch.turn_on
    target:
      entity_id: '{{ sw_id }}'
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.cumulus_debut_chauffe_actuelle
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  - service: logbook.log
    data:
      name: Cumulus Démarrage HC
      message: Démarrage HC intelligent
      entity_id: '{{ sw_id }}'
